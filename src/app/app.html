<div class="app-shell">
	<header class="app-header">
		<div class="header-content">
			<div class="header-text">
				<h1>Angular Feature Playground</h1>
				<p>Explore demos from the sidebar.</p>
			</div>
			<button
				mat-icon-button
				class="theme-toggle"
				(click)="toggleTheme()"
				[matTooltip]="darkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
				aria-label="Toggle light/dark theme"
			>
				<mat-icon>{{ darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
			</button>
		</div>
	</header>

	<div class="app-body">
		<aside class="app-sidebar" aria-label="Primary navigation">
			<nav>
				<a
					routerLink="/feature-lab"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>Feature Lab</a
				>
				<a
					routerLink="/features/agentic-starter"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>Agentic Starter</a
				>
				<a
					routerLink="/ai-text-editor"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>AI Text Editor</a
				>
				<a
					routerLink="/ai-chatbot"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>AI Chatbot</a
				>
				<a
					routerLink="/todo"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>SignalStore - Todo</a
				>
				<a
					routerLink="/signals"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>Signals</a
				>
				<a
					routerLink="/aria-showcase"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>ARIA Showcase</a
				>
				<a
					routerLink="/signal-forms"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>Signal Forms</a
				>
				<a
					routerLink="/cdk-examples"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>CDK Examples</a
				>
				<a
					routerLink="/material-examples"
					routerLinkActive="is-active"
					[routerLinkActiveOptions]="{ exact: true }"
					>Material Examples</a
				>
			</nav>
		</aside>

		<main class="app-main" id="main-content">
			<router-outlet />
		</main>
	</div>

	<footer class="app-footer">
		<small>Built with Angular 21 &mdash; {{ darkMode() ? '🌙 Dark' : '☀️ Light' }} theme</small>
	</footer>
</div>
